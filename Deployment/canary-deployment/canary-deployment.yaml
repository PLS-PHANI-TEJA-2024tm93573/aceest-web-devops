apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1   #small % of traffic
  selector:
    matchLabels:
      app: aceest
      track: canary
  template:
    metadata:
      labels:
        app: aceest
        track: canary
    spec:
      containers:
        - name: aceest-container
          image: plsphaniteja2024tm93573/aceest-web-app-2024tm93573:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000