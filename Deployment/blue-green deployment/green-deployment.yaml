apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: green
  template:
    metadata:
      labels:
        app: aceest
        version: green
    spec:
      containers:
        - name: aceest-container
          image: plsphaniteja2024tm93573/aceest-web-app-2024tm93573:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000