<!DOCTYPE html>

<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ACEest Fitness System</title>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Segoe+UI:400,700|Roboto:400,700&display=swap">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	   <header>
		   <h1>ACEest Functional Fitness</h1>
	   </header>
	   <div id="status-bar" style="background:#111;color:#d4af37;padding:0.5em 1em;min-height:1.5em;">
		   {% with messages = get_flashed_messages(with_categories=true) %}
			   {% if messages %}
				   {% for category, message in messages %}
					   <span class="status-{{ category }}">{{ message }}</span>
				   {% endfor %}
			   {% endif %}
		   {% endwith %}
	   </div>
	   <main>
		   {% block content %}{% endblock %}
	   </main>
</body>
</html>
