{% extends "base.html" %}
{% block content %}
<h2>Edit Client: {{ client.name }}</h2>
<form method="post">
  <div class="form-row"><label>Name</label><input name="name" value="{{ client.name }}" readonly></div>
  <div class="form-row"><label>Age</label><input name="age" type="number" value="{{ client.age or '' }}"></div>
  <div class="form-row"><label>Height (cm)</label><input name="height" type="number" step="0.1" value="{{ client.height or '' }}"></div>
  <div class="form-row"><label>Weight (kg)</label><input name="weight" type="number" step="0.1" value="{{ client.weight or '' }}"></div>
  <div class="form-row"><label>Program</label><input name="program" value="{{ client.program or '' }}"></div>
  <div class="form-row"><label>Target Weight</label><input name="target_weight" type="number" step="0.1" value="{{ client.target_weight or '' }}"></div>
  <div class="form-row"><label>Target Adherence</label><input name="target_adherence" type="number" value="{{ client.target_adherence or '' }}"></div>
  <div class="form-row"><label>Adherence</label><input name="adherence" type="number" value="{{ client.adherence or '' }}"></div>
  <div class="form-row"><label>Notes</label><input name="notes" value="{{ client.notes or '' }}"></div>
  <div class="form-row"><label>Calories</label><input name="calories" type="number" value="{{ client.calories or '' }}"></div>
  <div class="form-row"><label>Membership Expiry</label><input name="membership_expiry" type="date" value="{{ client.membership_expiry or '' }}"></div>
  <button type="submit">Save Changes</button>
  <a href="{{ url_for('main.index') }}">Cancel</a>
</form>
{% endblock %}
