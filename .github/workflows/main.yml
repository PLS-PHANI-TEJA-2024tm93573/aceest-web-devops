name: ACEest CI Pipeline

on:
  push:
    branches: 
      - main
      - release/*
      - feature-*
    tags:
      - 'v*.*.*'
  pull_request:
    branches: 
      - main

jobs:

  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Linter
        run: |
          pip install flake8
          # exclude tests directory from linting (tests may intentionally contain test-only styles)
          flake8 --exclude=tests .



  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t aceest-test:${{ contains(github.ref, 'feature/') && github.sha || 'latest' }} .



  automated-testing:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Test Docker Image
        run: |
          docker build -t aceest-test -f test.Dockerfile .

      - name: Run Test and Generate Coverage
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/app \
          aceest-test

      - name: Verify Coverage Files
        run: |
          ls -R

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            ./coverage.xml
            ./htmlcov/
            
  jenkins-trigger-and-wait:
    runs-on: self-hosted
    needs: [build-and-lint, docker-build, automated-testing]

    steps:
      - name: Trigger and Wait for Jenkins
        run: |
          QUEUE_URL=$(curl -i -X POST "http://localhost:8080/job/access-build/build" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
          | grep -i Location | awk '{print $2}' | tr -d '\r')

          echo "Queue URL: $QUEUE_URL"

          # Wait for build to start
          while true; do
            BUILD_URL=$(curl -s "$QUEUE_URL/api/json" \
              --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" | jq -r '.executable.url')

            if [ "$BUILD_URL" != "null" ]; then
              break
            fi

            sleep 3
          done

          echo "Build URL: $BUILD_URL"

          # Wait for completion
          while true; do
            RESULT=$(curl -s "${BUILD_URL}api/json" \
              --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" | jq -r '.result')

            if [ "$RESULT" != "null" ]; then
              break
            fi

            sleep 5
          done

          echo "Result: $RESULT"

          if [ "$RESULT" != "SUCCESS" ]; then
            exit 1
          fi


  push-dev-latest:
    name: Push Docker Image (dev-latest)
    runs-on: ubuntu-latest
    needs: [jenkins-trigger-and-wait]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Latest Git Tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Using tag: $TAG"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t plsphaniteja2024tm93573/aceest-web-app-2024tm93573:$TAG .

      - name: Push Docker Image
        run: |
          docker push plsphaniteja2024tm93573/aceest-web-app-2024tm93573:$TAG