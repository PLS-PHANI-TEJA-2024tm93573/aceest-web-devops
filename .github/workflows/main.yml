name: ACEest CI Pipeline

on:
  push:
    branches: 
      - main
      - release/*
      - feature/*
  pull_request:
    branches: 
      - main
      - release/*

jobs:

  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Linter
        run: |
          pip install flake8
          flake8 .



  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t aceest-test .



  automated-testing:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t aceest-test -f test.Dockerfile .

      - name: Run Test Suite in Container
        run: |
          docker run aceest-test