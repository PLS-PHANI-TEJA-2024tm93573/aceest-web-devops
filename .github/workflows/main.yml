name: ACEest CI Pipeline

on:
  push:
    branches: 
      - main
      - release/*
      - feature-*
    tags:
      - 'v*.*.*'
  pull_request:
    branches: 
      - main

jobs:

  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Linter
        run: |
          pip install flake8
          # exclude tests directory from linting (tests may intentionally contain test-only styles)
          flake8 --exclude=tests .



  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t aceest-test:${{ contains(github.ref, 'feature/') && github.sha || 'latest' }} .



  automated-testing:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Test Docker Image
        run: |
          docker build -t aceest-test -f test.Dockerfile .

      - name: Run Test and Generate Coverage
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/app \
          aceest-test

      - name: Verify Coverage Files
        run: |
          ls -R

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            ./coverage.xml
            ./htmlcov/
